<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Settings</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

<div class="container">

<h1>Shopping</h1>

<div class="card">

<div class="item" onclick="myOrders()">
<div class="left">
<span class="material-icons">receipt_long</span>
<span>My Orders</span>
</div>
<span class="material-icons">chevron_right</span>
</div>

<div class="item" onclick="wishlist()">
<div class="left">
<span class="material-icons">favorite</span>
<span>Wishlist</span>
</div>
<span class="material-icons">chevron_right</span>
</div>

<div class="item" onclick="cart()">
<div class="left">
<span class="material-icons">shopping_cart</span>
<span>Shopping Cart</span>
</div>
<span class="material-icons">chevron_right</span>
</div>

<div class="item" onclick="payment()">
<div class="left">
<span class="material-icons">credit_card</span>
<span>Payment Methods</span>
</div>
<span class="material-icons">chevron_right</span>
</div>

</div>

</div>
<style>body{
margin:0;
background:#f5f5f5;
font-family:Arial,sans-serif;
}

.container{
max-width:500px;
margin:30px auto;
padding:20px;
}

h1{
text-align:center;
margin-bottom:25px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
cursor:pointer;
border-bottom:1px solid #eee;
transition:.3s;
}

.item:last-child{
border-bottom:none;
}

.item:hover{
background:#f1f1f1;
}

.left{
display:flex;
align-items:center;
gap:15px;
}

.material-icons{
color:#4CAF50;
font-size:28px;
}
</style>
<script>
    function myOrders(){

alert("Opening My Orders...");

 window.location.href="orders.html";

}

function wishlist(){

alert("Opening Wishlist...");

window.location.href="wishlist.html";

}

function cart(){

alert("Opening Shopping Cart...");

 window.location.href="cart.html";

}

function payment(){

alert("Opening Payment Methods...");

window.location.href="payment.html";

}
</script>


</body>
</html>
