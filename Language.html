<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Settings</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

<div class="container">

<h1 id="title">Language</h1>

<div class="card">

<div class="language-item" onclick="setLanguage('en')">

<div class="left">
<span class="material-icons">language</span>
<span id="englishText">English</span>
</div>

<span class="material-icons check" id="check-en">check_circle</span>

</div>

<div class="language-item" onclick="setLanguage('ml')">

<div class="left">
<span class="material-icons">language</span>
<span id="malayalamText">മലയാളം</span>
</div>

<span class="material-icons check" id="check-ml">check_circle</span>

</div>

</div>

<hr>

<h2 id="sampleTitle">Sample Text</h2>

<p id="welcome">Welcome to Jo Mart Supermarket</p>

<p id="description">
Your one-stop destination for grocery shopping.
</p>

<button id="shopBtn">Start Shopping</button>

</div>
<style>
    body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

.container{
max-width:500px;
margin:30px auto;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.card{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.language-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
cursor:pointer;
border-bottom:1px solid #eee;
transition:0.3s;
}

.language-item:hover{
background:#f8f8f8;
}

.left{
display:flex;
align-items:center;
gap:15px;
}

.material-icons{
color:#4CAF50;
}

.check{
display:none;
}

button{
width:100%;
margin-top:20px;
padding:12px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#388E3C;
}
</style>
<script>
    const translations = {

en:{
title:"Language",
sampleTitle:"Sample Text",
welcome:"Welcome to Jo Mart Supermarket",
description:"Your one-stop destination for grocery shopping.",
button:"Start Shopping"
},

ml:{
title:"ഭാഷ",
sampleTitle:"ഉദാഹരണ വാചകം",
welcome:"ജോ മാർട്ട് സൂപ്പർമാർക്കറ്റിലേക്ക് സ്വാഗതം",
description:"നിങ്ങളുടെ എല്ലാ പലചരക്ക് സാധനങ്ങൾക്കും ഒരേയൊരു ലക്ഷ്യസ്ഥാനം.",
button:"ഷോപ്പിംഗ് ആരംഭിക്കുക"
}

};

function setLanguage(lang){

localStorage.setItem("language",lang);

document.getElementById("title").innerHTML=translations[lang].title;

document.getElementById("sampleTitle").innerHTML=translations[lang].sampleTitle;

document.getElementById("welcome").innerHTML=translations[lang].welcome;

document.getElementById("description").innerHTML=translations[lang].description;

document.getElementById("shopBtn").innerHTML=translations[lang].button;

document.getElementById("check-en").style.display="none";
document.getElementById("check-ml").style.display="none";

document.getElementById("check-"+lang).style.display="block";

}

window.onload=function(){

let lang=localStorage.getItem("language") || "en";

setLanguage(lang);

}
</script>
</body>
</html>
