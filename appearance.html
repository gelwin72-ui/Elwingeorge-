<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Appearance Settings</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

</head>
<body>

<div class="container">

<h1>Appearance</h1>

<div class="card">

<div class="option" onclick="setTheme('light')">

<div class="left">

<span class="material-icons">light_mode</span>

<span>Light Mode</span>

</div>

<span class="material-icons check" id="lightCheck">check_circle</span>

</div>

<div class="option" onclick="setTheme('dark')">

<div class="left">

<span class="material-icons">dark_mode</span>

<span>Dark Mode</span>

</div>

<span class="material-icons check" id="darkCheck">check_circle</span>

</div>

<div class="option" onclick="setTheme('system')">

<div class="left">

<span class="material-icons">devices</span>

<span>System Mode</span>

</div>

<span class="material-icons check" id="systemCheck">check_circle</span>

</div>

</div>

</div>
<style>
    body{

margin:0;

font-family:Arial,sans-serif;

background:#f5f5f5;

color:#222;

transition:.3s;

}

.container{

max-width:500px;

margin:30px auto;

padding:20px;

}

h1{

text-align:center;

}

.card{

background:white;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,.1);

overflow:hidden;

transition:.3s;

}

.option{

display:flex;

justify-content:space-between;

align-items:center;

padding:18px;

cursor:pointer;

border-bottom:1px solid #ddd;

}

.option:last-child{

border-bottom:none;

}

.option:hover{

background:#f0f0f0;

}

.left{

display:flex;

align-items:center;

gap:15px;

}

.material-icons{

color:#4CAF50;

}

.check{

display:none;

}

/* Dark Theme */

body.dark{

background:#121212;

color:white;

}

body.dark .card{

background:#1f1f1f;

}

body.dark .option{

border-color:#333;

}

body.dark .option:hover{

background:#2b2b2b;

}
</style>
<script>
    const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");

function applyTheme(theme){

document.body.classList.remove("dark");

document.getElementById("lightCheck").style.display="none";
document.getElementById("darkCheck").style.display="none";
document.getElementById("systemCheck").style.display="none";

if(theme==="light"){

document.getElementById("lightCheck").style.display="block";

}

else if(theme==="dark"){

document.body.classList.add("dark");

document.getElementById("darkCheck").style.display="block";

}

else{

document.getElementById("systemCheck").style.display="block";

if(mediaQuery.matches){

document.body.classList.add("dark");

}

}

}

function setTheme(theme){

localStorage.setItem("theme",theme);

applyTheme(theme);

}

window.onload=function(){

let theme=localStorage.getItem("theme") || "system";

applyTheme(theme);

}

mediaQuery.addEventListener("change",function(){

if(localStorage.getItem("theme")==="system"){

applyTheme("system");

}

});
</script>

</body>
</html>
