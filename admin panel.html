<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jo Mart Admin Panel</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f4f4f4;
}

.header{
  background:#27ae60;
  color:white;
  text-align:center;
  padding:15px;
  font-size:22px;
}

.container{
  display:flex;
  gap:20px;
  padding:20px;
}

/* ADMIN FORM */
.admin{
  width:300px;
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.admin input{
  width:100%;
  padding:8px;
  margin:5px 0;
}

button{
  padding:8px;
  width:100%;
  border:none;
  cursor:pointer;
  border-radius:5px;
}

.add-btn{
  background:#3498db;
  color:white;
}

/* PRODUCTS */
.products{
  flex:1;
  display:flex;
  flex-wrap:wrap;
  gap:15px;
}

.card{
  width:200px;
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}
.price{
  color:green;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">🛒 Jo Mart Admin Panel (Add Products Without HTML)</div>

<div class="container">

<!-- ADMIN PANEL -->
<div class="admin">
<h3>Add Product</h3>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="image" placeholder="Image URL (images/rice.jpg)">

<button class="add-btn" onclick="addProduct()">Add Product</button>
</div>

<!-- PRODUCTS DISPLAY -->
<div class="products" id="productList"></div>

</div>

<script>

// Load saved products
let products = JSON.parse(localStorage.getItem("/products.html")) || [];

// Show products
function display(){
  let box = document.getElementById("productList");
  box.innerHTML = "";

  products.forEach((p)=>{
    box.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p class="price">₹${p.price}</p>
      </div>
    `;
  });
}

// Add product
function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let image = document.getElementById("image").value;

  if(name=="" || price==""){
    alert("Fill all fields");
    return;
  }

  products.push({
    name:name,
    price:price,
    image:image
  });

  localStorage.setItem("/products.html", JSON.stringify(products));

  display();
}

// initial load
display();

</script>

</body>
</html>
