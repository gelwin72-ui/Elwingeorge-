<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location & Payments</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h2>📍 Location</h2>

    <div class="item">
        <span>Delivery Address</span>
        <button>Edit</button>
    </div>

    <div class="item">
        <span>GPS Permission</span>
        <label class="switch">
            <input type="checkbox" checked>
            <span class="slider"></span>
        </label>
    </div>

    <h2>💳 Payments</h2>

    <div class="item">
        <span>UPI</span>
        <button>Manage</button>
    </div>

    <div class="item">
        <span>Debit / Credit Cards</span>
        <button>Manage</button>
    </div>

    <div class="item">
        <span>Wallet</span>
        <button>Manage</button>
    </div>

</div>
<style>
  body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h2 {
  margin: 20px 0 10px;
}

.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #fff;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, .1);
}

button {
  background: #28a745;
  color: #fff;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
}

.switch {
  position: relative;
  display: inline-block;
  width: 50px;
  height: 26px;
}

.switch input {
  display: none;
}

.slider {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: #ccc;
  border-radius: 30px;
  transition: .4s;
}

.slider:before {
  content: "";
  position: absolute;
  width: 20px;
  height: 20px;
  left: 3px;
  bottom: 3px;
  background: #fff;
  border-radius: 50%;
  transition: .4s;
}

input:checked+.slider {
  background: #28a745;
}

input:checked+.slider:before {
  transform: translateX(24px);
}
</style>
<script>
  // Save GPS Permission
const gpsToggle = document.querySelector("input[type='checkbox']");

const saved = localStorage.getItem("gpsPermission");

if(saved !== null){
    gpsToggle.checked = saved === "true";
}

gpsToggle.addEventListener("change", function(){
    localStorage.setItem("gpsPermission", this.checked);
});

// Buttons
document.querySelectorAll("button").forEach(button => {
    button.addEventListener("click", function(){
        alert(this.parentElement.querySelector("span").innerText);
    });
});
</script>

</body>
</html>
